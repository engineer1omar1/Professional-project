<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/framework.css">
    <link rel="stylesheet" href="css/style.css">
<!-- ======== Google Font ========= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
   <div class="page-sign-up p-relative bg-white p-25">
    <div class="side-sign-up mr-25 ml-25 p-10 rad-12 bc-cd shadow p-relative z-3">
        <div class="side-sign-up-title p-relative d-flex align-center">
        <h1 class="c-black fs-18">Omar Said</h1>
        <div class="cursor-pointer">
            <input type="checkbox" id="side-sign-up-icon" hidden>
            <label for="side-sign-up-icon">
                <i class="fa-solid fa-bars side-sign-up-icon cursor-pointer"></i>
            </label>
        </div>
        </div>
        <ul class="side-links p-relative d-flex g-30">
            <li>
                <a href="dashboard.html" class="fs-14 c-black">Dashboard</a>
            </li>
            <li>
                <a href="profile.html" class="fs-14 c-black">Profile</a>
            </li>
            <li>
                <a href="sign-up.html" class="fs-14 c-black">Sign Up</a>
            </li>
            <li>
                <a href="sign-in.html" class="fs-14 c-black">Sign In</a>
            </li>
        </ul>
        <div class="links-online-freedownload d-flex align-center">
            <a href="#" class="fs-12 c-red btn-shape mr-10 transition">Online Builder</a>
            <a href="#" class="fs-12 fw-600 bg-black c-white btn-shape transition">Free Download</a>
        </div>
    </div>
    <div class="img-sign-up-email-password p-absolute">
        <div class="sign-up-email-password p-absolute p-15">
        <h2 class="fs-25">Sign Up</h2>
        <span class="c-threerd fs-16 d-block mt-15 mb-40">Enter your email and password to register</span>
        <div class="inputs">
            <input type="text" placeholder="name" class="p-12 bc-cd rad-8 w-full mb-15">
            <input type="email" placeholder="Email" class="p-12 bc-cd rad-8 w-full mb-15">
            <input type="password" placeholder="Password" class="p-12 bc-cd rad-8 w-full mb-15">
        </div>
        <div class="d-flex align-center">
            <label class="phone d-flex align-center cursor-pointer" for="phone">
                <input type="checkbox" id="phone" hidden checked>
                <div class="phone-input"></div>
                <span class="fs-14 c-threerd mr-5 ml-10 cursor-pointer"> I agree the</span>
            </label>
            <span class="c-black fs-14 fw-600">Terms and Conditions</span>
        </div>
        <div class="info">
        <a href="#" class="bg-image rad-8 c-white fs-14 w-full transition mt-40 btn-shape d-block fw-600 txt-c cursor-pointer">Sign Up</a>
        </div>
        <div class="sign-up-text d-flex align-center mt-30 mb-20 w-full centre-flex">
            <span class="fs-14 c-threerd mr-5">Don't have an account?</span>
            <a href="sign-up.html" class="fs-14 fw-600 c-secondary">Sign In</a>
        </div>
        </div>
        <div class="gazelle-picture p-absolute">
            <img src="Image/illustration-signup.webp" alt="">
        </div>
    </div>
   </div>
</body>
</html>

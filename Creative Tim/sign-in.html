<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/framework.css">
    <link rel="stylesheet" href="css/style.css">
<!-- ======== Google Font ========= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
   <div class="page-sign-in p-15">
    <div class="side-sign-in mr-25 ml-25 p-10 rad-12 bc-cd shadow p-relative z-3">
        <div class="side-sign-in-title p-relative d-flex align-center">
        <h1 class="c-black fs-18">Omar Said</h1>
        <div class="cursor-pointer">
            <input type="checkbox" id="side-sign-in-icon" hidden>
            <label for="side-sign-in-icon">
                <i class="fa-solid fa-bars side-sign-in-icon cursor-pointer"></i>
            </label>
        </div>
        </div>
        <ul class="side-links p-relative d-flex g-30">
            <li>
                <a href="dashboard.html" class="fs-14 c-black">Dashboard</a>
            </li>
            <li>
                <a href="profile.html" class="fs-14 c-black">Profile</a>
            </li>
            <li>
                <a href="sign-up.html" class="fs-14 c-black">Sign Up</a>
            </li>
            <li>
                <a href="sign-in.html" class="fs-14 c-black">Sign In</a>
            </li>
        </ul>
        <div class="links-online-freedownload d-flex align-center">
            <a href="#" class="fs-12 c-red btn-shape mr-10 transition">Online Builder</a>
            <a href="#" class="fs-12 fw-600 bg-black c-white btn-shape transition">Free Download</a>
        </div>
    </div>
    <div class="sign-in-email-password bg-white bc-cd rad-12 z-3 p-relative shadow p-15">
        <div class="title">
            <h2 class="fs-22 c-white bg-image rad-8 p-40 centre-flex">Sign In</h2>
        </div>
        <div class="inputs d-block">
            <label for="email">
                <input type="email" class="p-12 mt-30 pl-15 bc-cd rad-6 w-full" placeholder="Email">
            </label>
            <label for="password">
                <input type="password" class="p-12 mt-20 pl-20 bc-cd rad-6 w-full" placeholder="Password">
            </label>
            <div class="input-platform-settings w-full mt-20">
                <input type="checkbox" id="remember" class="toggle-checkbox" hidden checked>
                <label for="remember" class="d-flex align-center w-full">
                    <div class="toggle-switch p-relative cursor-pointer"></div>
                    <span class="toggle-text fs-14 ml-20 c-threerd cursor-pointer">Remember me</span>
                </label>
            </div>
        </div>
        <div class="info">
        <a href="sign-in.html" class="bg-image rad-8 c-white fs-14 w-full transition mt-40 btn-shape d-block fw-600 txt-c cursor-pointer">Sign In</a>
        </div>
        <div class="sign-up-text d-flex align-center mt-30 mb-20 w-full centre-flex">
            <span class="fs-14 c-threerd mr-5">Don't have an account?</span>
            <a href="sign-up.html" class="fs-14 fw-600 c-secondary">Sign Up</a>
        </div>
    </div>
   </div>
</body>
</html>
